# ===== Datasource =====
quarkus.datasource.db-kind=postgresql
quarkus.datasource.username=booking_user
quarkus.datasource.password=booking_pass
quarkus.datasource.jdbc.url=jdbc:postgresql://localhost:5432/booking_app

# ===== Hibernate ORM =====
quarkus.hibernate-orm.database.generation=none
quarkus.hibernate-orm.log.sql=true

# ===== Flyway =====
quarkus.flyway.migrate-at-start=true
quarkus.flyway.locations=classpath:db/migration
quarkus.flyway.clean-on-validation-error=true

# ===== JWT =====
mp.jwt.verify.publickey.location=publicKey.pem
mp.jwt.verify.issuer=https://booking-app.local
smallrye.jwt.sign.key.location=privateKey.pem
smallrye.jwt.new-token.lifespan=86400
smallrye.jwt.new-token.issuer=https://booking-app.local

# ===== CORS =====
quarkus.http.cors=true
quarkus.http.cors.origins=http://localhost:5173
quarkus.http.cors.methods=GET,POST,PUT,DELETE,OPTIONS
quarkus.http.cors.headers=Content-Type,Authorization
quarkus.http.cors.exposed-headers=Authorization

# ===== Mailer (MailPit) =====
quarkus.mailer.from=noreply@booking-app.local
quarkus.mailer.host=localhost
quarkus.mailer.port=1025
quarkus.mailer.start-tls=DISABLED
quarkus.mailer.mock=false

# ===== HTTP =====
quarkus.http.port=8080
